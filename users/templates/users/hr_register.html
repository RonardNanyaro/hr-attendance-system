<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Registration - HR Attendance System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #e0f2f1 0%, #f0fdf4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-container {
            width: 100%;
            max-width: 500px;
        }

        .register-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        .register-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .register-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #0F766E 0%, #14B8A6 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .register-icon svg {
            width: 36px;
            height: 36px;
        }

        .register-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .register-header p {
            font-size: 14px;
            color: #64748b;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #334155;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            font-size: 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
        }

        .input-group input:focus {
            border-color: #0F766E;
            box-shadow: 0 0 0 3px rgba(15,118,110,0.1);
        }

        .input-group input::placeholder {
            color: #94a3b8;
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 45px;
        }

        .toggle-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #94a3b8;
        }

        .toggle-btn:hover {
            color: #0F766E;
        }

        .phone-note {
            font-size: 11px;
            color: #64748b;
            margin-top: 4px;
        }

        .register-btn {
            width: 100%;
            padding: 14px;
            background: #0F766E;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .register-btn:hover {
            background: #14B8A6;
            transform: translateY(-2px);
        }

        .register-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            text-align: center;
            position: relative;
            margin: 24px 0;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e2e8f0;
        }

        .divider span {
            background: white;
            padding: 0 12px;
            font-size: 12px;
            color: #94a3b8;
            position: relative;
        }

        .social-row {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            background: white;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: #334155;
        }

        .social-btn:hover {
            border-color: #0F766E;
            background: #f8fafc;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
        }

        .login-link a {
            color: #0F766E;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .login-link p {
            color: #64748b;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .error-msg, .success-msg {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .error-msg {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fee2e2;
        }

        .success-msg {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #dcfce7;
        }

        @media (max-width: 480px) {
            .register-card {
                padding: 28px 20px;
            }
            .register-header h1 {
                font-size: 24px;
            }
            .social-row {
                gap: 12px;
            }
        }
    </style>
</head>
<body>

<div class="register-container">
    <div class="register-card">
        <div class="register-header">
            <div class="register-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12ZM12 14C9.33 14 4 15.34 4 18V20H20V18C20 15.34 14.67 14 12 14Z" fill="white"/>
                    <circle cx="12" cy="8" r="2.5" fill="#14B8A6"/>
                </svg>
            </div>
            <h1>Register Company</h1>
            <p>Create your HR account and company profile</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="{% if message.tags == 'error' %}error-msg{% else %}success-msg{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" id="registerForm">
            {% csrf_token %}

            <div class="input-group">
                <label>Company Name</label>
                <input type="text" name="company_name" placeholder="Enter your company name" required>
            </div>

            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Choose a username" required>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@company.com" required>
            </div>

            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" name="phone" placeholder="+255XXXXXXXXX" required>
                <div class="phone-note">📱 Include country code (e.g., +255 for Tanzania)</div>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="password" placeholder="Create a strong password" required>
                    <button type="button" class="toggle-btn" onclick="togglePassword('password')">👁️</button>
                </div>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm your password" required>
                    <button type="button" class="toggle-btn" onclick="togglePassword('confirm_password')">👁️</button>
                </div>
            </div>

            <button type="submit" class="register-btn" id="submitBtn">Register Company</button>
        </form>

        <div class="divider">
            <span>or register with</span>
        </div>

        <div class="social-row">
            <button type="button" class="social-btn" onclick="socialRegister('google')">
                <svg width="18" height="18" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Google
            </button>
            <button type="button" class="social-btn" onclick="socialRegister('apple')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M14.94 5.19A4.38 4.38 0 0 0 16 2.46a4.44 4.44 0 0 0-3.13 1.28 4.33 4.33 0 0 0-1.12 2.91 3.88 3.88 0 0 0 3.19-1.46zm3.52 6.55c.94 1.11 1.41 2.54 1.41 4.27 0 2.13-1.04 4.17-2.76 5.7-.9.78-1.97 1.19-2.89 1.19-.79 0-1.35-.21-1.91-.21-.58 0-1.23.2-1.97.2-1.08 0-2.2-.52-3.13-1.47-1.9-1.82-2.97-4.23-2.97-6.93 0-2.44 1.01-4.5 2.9-5.91.99-.74 2.15-1.13 3.25-1.13.79 0 1.47.18 2.1.37.57.17 1.06.32 1.44.32.32 0 .81-.13 1.46-.4.95-.38 1.93-.56 2.77-.56 1.34 0 2.73.41 3.85 1.27-1.04.64-1.84 1.6-2.19 2.84z"/>
                </svg>
                Apple
            </button>
        </div>

        <div class="login-link">
            <p>Already have an account?</p>
            <a href="{% url 'users:hr_login' %}">Sign in to your account →</a>
        </div>
    </div>
</div>

<script>
    function togglePassword(fieldId) {
        const field = document.getElementById(fieldId);
        const button = event.target;
        if (field.type === "password") {
            field.type = "text";
            button.textContent = "🙈";
        } else {
            field.type = "password";
            button.textContent = "👁️";
        }
    }

    function socialRegister(provider) {
        if (provider === 'google') {
            window.location.href = "{% url 'users:google_auth' %}";
        } else if (provider === 'apple') {
            window.location.href = "{% url 'users:apple_auth' %}";
        }
    }

    document.getElementById('registerForm').addEventListener('submit', function(e) {
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm_password').value;
        
        if (password !== confirm) {
            e.preventDefault();
            alert('Passwords do not match!');
            return;
        }
        
        if (password.length < 8) {
            e.preventDefault();
            alert('Password must be at least 8 characters long');
            return;
        }
        
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Registering...';
    });
</script>

</body>
</html>
