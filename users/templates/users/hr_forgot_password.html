<!DOCTYPE html>
<html>
<head>
<title>Forgot Password - HR System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root {
    --primary: #0F766E;      /* Deep Teal - Main brand color */
    --secondary: #14B8A6;    /* Soft Teal - Hover states */
    --background: #FFFAFA;   /* Snow White - Main background */
    --card-bg: #FFFFFF;      /* Pure White - Cards */
    --text-primary: #1E293B;  /* Dark Slate - Main text */
    --text-secondary: #64748B; /* Gray - Secondary text */
    --border: #E2E8F0;        /* Light gray border */
    --green: #10B981;
    --red: #EF4444;
    
    --shadow-luxury: 0 20px 35px -10px rgba(0,0,0,0.1);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 20px;
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--background);
    min-height: 100vh;
    color: var(--text-primary);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    position: relative;
}

/* Subtle background pattern */
body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image: radial-gradient(circle at 25% 50%, rgba(15,118,110,0.03) 0%, transparent 50%),
                      radial-gradient(circle at 75% 80%, rgba(15,118,110,0.02) 0%, transparent 50%);
    pointer-events: none;
}

.container {
    max-width: 480px;
    width: 100%;
    position: relative;
    z-index: 1;
}

.card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 40px 36px;
    box-shadow: var(--shadow-luxury);
    animation: fadeIn 0.5s ease;
    position: relative;
}

/* Top accent line */
.card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 10%;
    right: 10%;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--primary), var(--secondary), var(--primary), transparent);
    border-radius: 3px;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Icon */
.lock-icon {
    margin-bottom: 20px;
    text-align: center;
}

h2 {
    margin: 0 0 8px 0;
    font-size: 26px;
    font-weight: 700;
    color: var(--text-primary);
    text-align: center;
    letter-spacing: -0.3px;
}

.subtitle {
    text-align: center;
    color: var(--text-secondary);
    font-size: 14px;
    margin-bottom: 32px;
    font-weight: 400;
}

.form-group {
    margin-bottom: 24px;
}

label {
    display: block;
    margin-bottom: 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
}

input {
    width: 100%;
    padding: 12px 16px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    background: var(--background);
    color: var(--text-primary);
    outline: none;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    transition: var(--transition);
}

input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(15,118,110,0.1);
}

input::placeholder {
    color: var(--text-secondary);
}

button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: var(--radius-md);
    background: var(--primary);
    color: white;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: var(--transition);
}

button:hover {
    background: var(--secondary);
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(15,118,110,0.25);
}

.message {
    padding: 12px 16px;
    border-radius: var(--radius-md);
    margin-bottom: 24px;
    font-size: 13px;
    font-weight: 500;
}

.success {
    background: rgba(16,185,129,0.1);
    color: var(--green);
    border: 1px solid rgba(16,185,129,0.2);
}

.error {
    background: rgba(239,68,68,0.1);
    color: var(--red);
    border: 1px solid rgba(239,68,68,0.2);
}

.info {
    background: rgba(15,118,110,0.08);
    color: var(--primary);
    border: 1px solid rgba(15,118,110,0.15);
}

.links {
    text-align: center;
    margin-top: 24px;
}

.links a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 13px;
    transition: var(--transition);
}

.links a:hover {
    color: var(--primary);
}

.back-link {
    text-align: center;
    margin-top: 12px;
}

.back-link a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 12px;
    transition: var(--transition);
}

.back-link a:hover {
    color: var(--primary);
}

/* Responsive */
@media (max-width: 480px) {
    .card {
        padding: 28px 20px;
    }
    
    h2 {
        font-size: 22px;
    }
    
    .subtitle {
        font-size: 13px;
        margin-bottom: 24px;
    }
    
    input, button {
        padding: 10px 14px;
    }
}
</style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="lock-icon">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M18 8H17V6C17 3.24 14.76 1 12 1C9.24 1 7 3.24 7 6V8H6C4.9 8 4 8.9 4 10V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V10C20 8.9 19.1 8 18 8ZM12 17C10.9 17 10 16.1 10 15C10 13.9 10.9 13 12 13C13.1 13 14 13.9 14 15C14 16.1 13.1 17 12 17ZM15.1 8H8.9V6C8.9 4.29 10.29 2.9 12 2.9C13.71 2.9 15.1 4.29 15.1 6V8Z" fill="#0F766E"/>
                <circle cx="12" cy="15" r="1.5" fill="#14B8A6"/>
            </svg>
        </div>
        
        <h2>Forgot Password?</h2>
        <div class="subtitle">Enter your email to receive a password reset link</div>
        
        {% if messages %}
            {% for message in messages %}
                <div class="message {% if message.tags == 'success' %}success{% elif message.tags == 'error' %}error{% else %}info{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="your-email@company.com" required>
            </div>
            <button type="submit">Send Reset Link</button>
        </form>
        
        <div class="links">
            <a href="{% url 'users:hr_login' %}">← Back to Login</a>
        </div>
        <div class="back-link">
            <a href="{% url 'users:hr_register' %}">Don't have an account? Register</a>
        </div>
    </div>
</div>
</body>
</html>
