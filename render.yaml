services:
  - type: web
    name: hr-attendance-system
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn mylife.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hr-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: PYTHON_VERSION
        value: 3.11

databases:
  - name: hr-db
    plan: free
    databaseName: hr_attendance
    user: hr_user