# render.yaml
services:
  - type: web
    name: hr-attendance-system
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn mylife.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: hr-attendance-db
          property: connectionString
    plan: starter
    healthCheckPath: /health-check/

databases:
  - name: hr-attendance-db
    plan: starter
    databaseName: hr_attendance
    user: hr_user